<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>MyFirstProject</title>
  <style>
    .header {
      display: flex;
      align-items: center;
      padding: 10px;
      border: 2px solid red;
    }
    .logo {
      font-weight: bold;
      font-size: 24px;
      color: #dd0031;
      margin-right: 20px;
    }
    .title {
      margin: 0 auto;
    }
    .buttons button {
      margin: 0 5px;
    }
    .items {
      margin-left: 20px;
    }
    .items button {
      margin: 0 3px;
      border: 1px solid green;
      border-radius: 5px;
      padding: 5px 10px;
    }
  </style>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    class Header extends React.Component {
      constructor(props) {
        super(props);
        this.state = {
          dark: false,
          color: '#9ef0c9'
        };
        this.toggleTheme = this.toggleTheme.bind(this);
        this.changeColor = this.changeColor.bind(this);
      }

      toggleTheme() {
        this.setState({ dark: !this.state.dark });
      }

      changeColor() {
        const colors = ['#9ef0c9', '#f0c9c9', '#c9d4f0', '#f0e6c9'];
        const next = colors[Math.floor(Math.random() * colors.length)];
        this.setState({ color: next });
      }

      render() {
        const headerStyle = {
          background: this.state.dark ? '#222' : '#f8c8dc',
          color: this.state.dark ? '#fff' : '#000'
        };

        const itemStyle = {
          background: this.state.color
        };

        return (
          <header className="header" style={headerStyle}>
            <div className="logo">A</div>
            <div className="title">Header</div>
            <div className="buttons">
              <button onClick={this.changeColor}>Цвет</button>
              <button onClick={this.toggleTheme}>Тема</button>
            </div>
            <div className="items">
              <button style={itemStyle}>Item 1</button>
              <button style={itemStyle}>Item 1</button>
              <button style={itemStyle}>Item 1</button>
              <button style={itemStyle}>Item 1</button>
              <button style={itemStyle}>Item 1</button>
            </div>
          </header>
        );
      }
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Header />);
  </script>
</body>
</html>
